{% extends "base.html" %}
{% block content %}
<article>
    <h2>Iniciar sesión</h2>
    <form method="POST">
        <label>Email
            <input type="email" name="email" required>
        </label>
        <label>Contraseña
            <input type="password" name="password" required>
        </label>
        <button type="submit">Entrar</button>
    </form>
    <p>¿No tienes cuenta? <a href="{{ url_for('auth.registro') }}">Regístrate</a></p>
</article>
{% endblock %}
